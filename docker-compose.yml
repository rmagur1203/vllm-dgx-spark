services:
  drop-caches:
    image: alpine
    privileged: true
    pid: host
    entrypoint: ["sh", "-c", "sync && echo 3 > /proc/sys/vm/drop_caches && echo 'Page cache dropped'"]

  nemotron-3-super:
    build:
      context: .
      dockerfile: Dockerfile
    image: vllm:latest
    container_name: vllm-nemotron-3-super-120b-a12b-nvfp4
    depends_on:
      drop-caches:
        condition: service_completed_successfully
    restart: "no"
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    ipc: host
    shm_size: "16g"
    ulimits:
      memlock: -1
      stack: 67108864
    environment:
      TORCHINDUCTOR_COMPILE_THREADS: "1"
      MAX_JOBS: "2"
      FLASHINFER_CUDA_ARCH_LIST: "12.1a"
      FLASHINFER_DISABLE_VERSION_CHECK: "1"
      FLASHINFER_EXTRA_CUDAFLAGS: "-DCUTLASS_ENABLE_GDC_FOR_SM100=1"
      VLLM_KV_CACHE_LAYOUT: "HND"
      VLLM_NVFP4_GEMM_BACKEND: "flashinfer-cutlass"
      VLLM_USE_FLASHINFER_MOE_FP4: "1"
      HF_HOME: "/root/.cache/huggingface"
    volumes:
      # Model/cache storage
      - ./hf-cache:/root/.cache
      # Scripts
      - ./scripts/prebuild_flashinfer_jit.py:/workspace/prebuild_flashinfer_jit.py:ro
      - ./scripts/super_v3_reasoning_parser.py:/workspace/super_v3_reasoning_parser.py:ro
      # Runtime patches (vLLM + FlashInfer)
      - ./patches/runtime/tvm_build_patch.py:/usr/local/lib/python3.12/dist-packages/tvm_ffi/utils/_build_optional_torch_c_dlpack.py:ro
      - ./patches/runtime/cutlass_heuristic_patch.cpp:/usr/local/lib/python3.12/dist-packages/flashinfer/data/csrc/nv_internal/tensorrt_llm/kernels/cutlass_kernels/cutlass_heuristic.cpp:ro
      - ./patches/runtime/vllm_flashinfer_utils_patch.py:/usr/local/lib/python3.12/dist-packages/vllm/utils/flashinfer.py:ro
      - ./patches/runtime/flashinfer_backend_patch.py:/usr/local/lib/python3.12/dist-packages/vllm/v1/attention/backends/flashinfer.py:ro
      - ./patches/runtime/mamba_mixer2_patch.py:/usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/mamba/mamba_mixer2.py:ro
      # CUTLASS SMEM optimization patches (alignas(128), StageCount<4>, static_assert sm120)
      - ./patches/cutlass/moe_gemm_tma_ws_launcher_patch.inl:/usr/local/lib/python3.12/dist-packages/flashinfer/data/csrc/nv_internal/tensorrt_llm/kernels/cutlass_kernels/moe_gemm/launchers/moe_gemm_tma_ws_launcher.inl:ro
      - ./patches/cutlass/sm120_blockscaled_mma_array_tma.hpp:/usr/local/lib/python3.12/dist-packages/flashinfer/data/cutlass/include/cutlass/gemm/collective/sm120_blockscaled_mma_array_tma.hpp:ro
      - ./patches/cutlass/sm120_blockscaled_mma_builder.inl:/usr/local/lib/python3.12/dist-packages/flashinfer/data/cutlass/include/cutlass/gemm/collective/builders/sm120_blockscaled_mma_builder.inl:ro
      - ./patches/cutlass/sm103_blockscaled_gemm_array_tma_warpspecialized.hpp:/usr/local/lib/python3.12/dist-packages/flashinfer/data/cutlass/include/cutlass/gemm/kernel/sm103_blockscaled_gemm_array_tma_warpspecialized.hpp:ro
    entrypoint: ["bash", "-c", "python3 /workspace/prebuild_flashinfer_jit.py && exec python3 -m vllm.entrypoints.openai.api_server \"$$@\"", "--"]
    command:
      - --model=nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
      - --served-model-name=vllm/nemotron-3-super-120b
      - --trust-remote-code
      - --enable-sleep-mode
      - --tool-call-parser=qwen3_coder
      - --reasoning-parser-plugin=/workspace/super_v3_reasoning_parser.py
      - --reasoning-parser=super_v3
      - --enable-auto-tool-choice
      - --host=0.0.0.0
      - --port=8000
      - --tensor-parallel-size=1
      - --enable-chunked-prefill
      - --max-model-len=131072
      - --enable-prefix-caching
      - --mamba-cache-mode=align
      - --load-format=fastsafetensors
      - --gpu-memory-utilization=0.8
      - --attention-config={"disable_flashinfer_q_quantization":true}
      - --attention-backend=FLASHINFER
      - --max-num-batched-tokens=8400
      - --compilation-config={"cudagraph_mode":"full_and_piecewise","pass_config":{"fuse_norm_quant":true,"fuse_act_quant":true}}
      - --speculative-config={"method":"mtp","num_speculative_tokens":2}
      - --api-key=${VLLM_API_KEY}
